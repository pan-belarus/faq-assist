services:
  faq-assist-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: faq-assist-api
    ports:
      - 8686:8000
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://faq-assist-neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4jpassword}
      - REDIS_HOST=faq-assist-redis
      - REDIS_PORT=6379
    depends_on:
      - faq-assist-neo4j
      - faq-assist-redis
    networks:
      - faq-assist-network

  faq-assist-neo4j:
    image: neo4j:5
    container_name: faq-assist-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4jpassword}
    ports:
      - 7474:7474
      - 7687:7687
    volumes:
      - neo4j_data:/data
    networks:
      - faq-assist-network

  faq-assist-redis:
    image: redis:7.2
    container_name: faq-assist-redis
    restart: unless-stopped
    ports:
      - 6382:6379
    env_file:
      - .env
    volumes:
      - redis_data:/data
    networks:
      - faq-assist-network
    command: [ "redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}" ]

networks:
  faq-assist-network:
    driver: bridge
    name: faq-assist-network

volumes:
  minio-data:
  redis_data:
  neo4j_data: